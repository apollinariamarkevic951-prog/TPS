services:
  db:
    image: postgres:16
    container_name: tps_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: tps
      POSTGRES_USER: tps
      POSTGRES_PASSWORD: tps
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

volumes:
  pgdata: